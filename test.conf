server {
    listen 80;
    server_name logit-xams.nl www.logit-xams.nl;
    return 301 https://$host$request_uri;
}

server {
    server_name logit-xams.nl www.logit-xams.nl;

    # Portal — entry point
    location = / {
        root /root/QuantMini/portal;
        try_files /index.html =404;
    }

    location = /style.css {
        root /root/QuantMini/portal;
    }

    # Minkowski lives here
    location /minkowski/ {
        alias /var/www/minkowski/;
        try_files $uri $uri/ /minkowski/index.html;
    }

    location = /minkowski {
        return 301 /minkowski/;
    }

    # QuantApp — Quantum Mechanics Simulator
    location /quantapp/ {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location = /quantapp {
        return 301 /quantapp/;
    }

    # QuantMini — Quantum Mechanics mini apps
    location /quantmini/ {
        proxy_pass http://127.0.0.1:8502;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location = /quantmini {
        return 301 /quantmini/;
    }

    # QuantLectures — Quantum Mechanics Lectures
    location /quantlectures/ {
        proxy_pass http://127.0.0.1:3010/quantlectures/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /quantlectures {
        return 301 /quantlectures/;
    }

    # Krummikrub — React/Vite SPA, dockerized nginx on port 5173.
    # Trailing slash on proxy_pass strips "/krummikrub/" before forwarding,
    # so the container nginx serves the SPA from its own root. Image must be
    # built with BASE_PATH=/krummikrub/ so asset URLs match this prefix.
    location /krummikrub/api/ {
        proxy_pass http://127.0.0.1:5174/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /krummikrub/ {
        proxy_pass http://127.0.0.1:5173/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /krummikrub {
        return 301 /krummikrub/;
    }

    # JobShooter — Phaser space shooter, static files served from dist/.
    # Build with: base='/jobshooter/' and VITE_SCORES_API=https://logit-xams.nl/jobshooter-scores
    location /jobshooter/ {
        alias /opt/jobshooter/dist/;
        try_files $uri /jobshooter/index.html;
    }

    location = /jobshooter {
        return 301 /jobshooter/;
    }

    # JobShooter — high-score API (Node on :3001)
    location /jobshooter-scores/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/logit-xams.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logit-xams.nl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
