services:
  scores:
    build: ./server
    container_name: jobshooter-scores
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - scores-data:/data

  web:
    build:
      context: .
      args:
        VITE_SCORES_API: "http://localhost:3001"
    container_name: jobshooter-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - scores

volumes:
  scores-data:
