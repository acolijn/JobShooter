# Add these two server blocks to your existing nginx config.
# Update APP_ROOT to point to the dist/ folder on your server (e.g. /opt/jobshooter/dist).
# After adding: sudo nginx -t && sudo systemctl reload nginx

# ---- Game (static files) on port 5175 ----
server {
    listen 5175;
    listen [::]:5175;

    root /opt/jobshooter/dist;   # <-- update this path
    index index.html;

    # SPA fallback: all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite hashes asset filenames — cache them aggressively
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}

# ---- Scores API on port 5176 ----
server {
    listen 5176;
    listen [::]:5176;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
