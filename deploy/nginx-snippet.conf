# Add these blocks inside your existing HTTPS server block,
# just before the `listen 443 ssl;` line.
# After adding: sudo nginx -t && sudo systemctl reload nginx

# JobShooter — Phaser space shooter, static files served from dist/.
# Build with: base='/jobshooter/' and VITE_SCORES_API=https://logit-xams.nl/jobshooter-scores
location /jobshooter/ {
    alias /opt/jobshooter/dist/;
    try_files $uri /jobshooter/index.html;
}

location = /jobshooter {
    return 301 /jobshooter/;
}

# JobShooter — high-score API (Node on :3001)
location /jobshooter-scores/ {
    proxy_pass http://127.0.0.1:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
